name: Update Threat Live Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */6 * * *"

permissions:
  contents: write

jobs:
  refresh-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh live feed data
        run: node scripts/update-threat-feed.mjs

      - name: Refresh TLD insights data
        run: python3 scripts/update_tld_insights.py

      - name: Commit updates
        run: |
          if git diff --quiet -- data/threat-live.json data/tld-insights.json; then
            echo "No feed changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/threat-live.json data/tld-insights.json
          git commit -m "chore: refresh threat intel datasets"
          git push
