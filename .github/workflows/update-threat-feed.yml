name: Update Threat Live Feed

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh live feed data
        run: |
          if [ -f scripts/update-threat-feed.mjs ]; then
            node scripts/update-threat-feed.mjs || echo "Skipping live feed refresh after script error"
          else
            echo "Skipping live feed refresh: scripts/update-threat-feed.mjs not found"
          fi

      - name: Refresh TLD insights data
        run: |
          if [ -f scripts/update_tld_insights.py ]; then
            python3 scripts/update_tld_insights.py || echo "Skipping TLD refresh after script error"
          else
            echo "Skipping TLD refresh: scripts/update_tld_insights.py not found"
          fi

      - name: Commit updates
        run: |
          if git diff --quiet -- data/threat-live.json data/tld-insights.json; then
            echo "No feed changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/threat-live.json data/tld-insights.json
          git commit -m "chore: refresh threat intel datasets"
          git push
