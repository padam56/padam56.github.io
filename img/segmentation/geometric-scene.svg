<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="Geometric segmentation scene">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe" />
      <stop offset="100%" stop-color="#bfdbfe" />
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#cbd5e1" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>
    <linearGradient id="sphere" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="cylinder" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#93c5fd" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)" />
  <rect y="500" width="1200" height="260" fill="url(#floor)" />

  <ellipse cx="300" cy="540" rx="150" ry="35" fill="#64748b" opacity="0.3" />
  <circle cx="300" cy="400" r="145" fill="url(#sphere)" />
  <circle cx="250" cy="350" r="40" fill="#fff7ed" opacity="0.6" />

  <ellipse cx="760" cy="550" rx="160" ry="36" fill="#475569" opacity="0.3" />
  <ellipse cx="760" cy="335" rx="120" ry="52" fill="#60a5fa" />
  <rect x="640" y="335" width="240" height="215" fill="url(#cylinder)" />
  <ellipse cx="760" cy="550" rx="120" ry="52" fill="#1d4ed8" />

  <ellipse cx="1020" cy="550" rx="120" ry="30" fill="#475569" opacity="0.28" />
  <polygon points="1020,250 900,550 1140,550" fill="#ef4444" />
  <polygon points="1020,250 960,550 1020,550" fill="#dc2626" />
  <polygon points="1020,250 1080,550 1020,550" fill="#b91c1c" />
</svg>
